<script type="text/javascript" language="javascript">
	window.onload = init;
	function init() {
		try {
			WebSquare.startApplication();

		} catch (e) {
			onWebsquareError(e.message);//조치가이드 화면 오픈
		}
	}
	/**
	 * 웹스퀘어 오류에 대한 조치 가이드 팝업창
	 * @return 변수값
	 * @2020.03.04 신규 생성. 
	 */
	function onWebsquareError(strMsg) {
		if (confirm("사용하시는 브라우저의 사용가능 Memory가 부족합니다.\n\n전체 브라우저 종료 후 다시 이용 부탁드립니다.\n\n가이드 페이지로 이동하시려면 확인을 선택해 주세요!\n\n[ "
				+ strMsg + "]")) {
			window.open("http://scm.[BASE_DOMAIN]/hpcm/SCM9001.html",
					"WebsquareErrorGuide", "width=800px,height=600px");
		}
	}
